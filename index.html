<html lang="en">
<head>

<title>CPS Load Master</title>
<style>
:root{--bg:#f5f6f8;--card:#fff;--ink:#1d1d1f;--muted:#68707a;--line:#d7dbe1;--orange:#ff6d12;--soft:#fff3eb;--dark:#252525;--green:#17684d;--red:#74312b;--gold:#7c5217}*{box-sizing:border-box}html,body{margin:0;min-width:320px;background:var(--bg);color:var(--ink);font-family:Arial,Helvetica,sans-serif}button,input,select{font:inherit}button{cursor:pointer}button:disabled{opacity:.42;cursor:not-allowed}input,select{width:100%;min-height:54px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);outline:0;padding:0 14px}input:focus,select:focus{border-color:var(--orange);box-shadow:0 0 0 4px rgba(255,109,18,.12)}.screen,.panel{display:none}.screen.active,.panel.active{display:grid}.start{min-height:100svh;place-items:center;align-content:center;gap:28px;padding:24px;text-align:center}.logo{width:min(188px,58vw);height:auto}.kicker,.title span,.card span,.card small,.summary span,.summary small,.cargo span,.stat span,.fit span{margin:0;color:var(--muted);font-size:.74rem;font-weight:850;letter-spacing:.08em;text-transform:uppercase}h1,h2{margin:0}.start h1,.title h2,.hero h2,.nocargo h2{font-size:clamp(3.2rem,15vw,6.2rem);line-height:.9;letter-spacing:0}.flow{min-height:100svh;width:min(980px,100%);margin:0 auto;gap:16px;padding:12px 12px 28px}.top{position:sticky;top:0;z-index:10;display:grid;grid-template-columns:54px 1fr auto;gap:8px;align-items:center;padding:8px 0;background:rgba(245,246,248,.92);backdrop-filter:blur(18px)}.logoBtn{display:grid;place-items:center;width:52px;height:52px;border:1px solid var(--line);border-radius:8px;background:#fff}.logoBtn img{width:44px}.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:4px;border:1px solid var(--line);border-radius:8px;background:#fff}.step{min-height:38px;border:0;border-radius:6px;background:transparent;color:var(--muted);font-size:.78rem;font-weight:850}.step.active{background:var(--dark);color:#fff}.new{min-height:46px;border:1px solid rgba(255,109,18,.28);border-radius:8px;background:var(--soft);color:var(--orange);padding:0 13px;font-weight:900}.panel{gap:16px}.title{display:grid;gap:8px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.card{min-height:108px;display:grid;align-content:space-between;gap:8px;border:1px solid var(--line);border-radius:8px;padding:14px;background:var(--card);color:var(--ink);text-align:left}.card strong{overflow-wrap:anywhere;font-size:1.03rem;line-height:1.1}.card.selected{border-color:var(--dark);background:var(--dark);color:#fff}.card.selected span,.card.selected small{color:#d8dbe0}.card.custom{border-color:rgba(255,109,18,.34);background:var(--soft)}.card.custom.selected{background:var(--dark)}.box,.form{display:grid;gap:10px;border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff}.hidden{display:none!important}.summary{display:grid;gap:6px;border-radius:8px;padding:18px;background:var(--dark);color:#fff}.summary strong{font-size:1.34rem}.summary span,.summary small{color:#d8dbe0}.primary,.secondary,.ghost{min-height:56px;display:grid;place-items:center;border-radius:8px;padding:0 20px;font-weight:950}.primary{border:0;background:var(--orange);color:#fff;box-shadow:0 12px 28px rgba(255,109,18,.22)}.secondary{border:0;background:var(--dark);color:#fff}.ghost{border:1px solid var(--line);background:#fff;color:var(--ink)}.wide{width:100%}.list{display:grid;gap:10px}.empty{min-height:130px;display:grid;place-items:center;border:1px dashed #c9ced6;border-radius:8px;background:rgba(255,255,255,.74);color:var(--muted);font-weight:850}.cargo,.fit{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:8px;padding:13px 14px;background:#fff}.cargo>div:first-child,.fit{min-width:0}.cargo strong,.fit strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.cargo span{display:block;margin-top:4px}.cargoActions{display:flex;flex:0 0 auto;gap:6px}.cargoActions button{min-height:40px;border:0;border-radius:8px;background:var(--soft);color:var(--orange);padding:0 10px;font-size:.86rem;font-weight:900}.hero{min-height:260px;display:grid;align-content:end;gap:10px;border-radius:8px;padding:22px;color:#fff;background:var(--dark)}.hero.ok{background:var(--green)}.hero.warn{background:var(--gold)}.hero.bad{background:var(--red)}.hero span{color:rgba(255,255,255,.82);font-weight:900}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{min-height:124px;display:grid;align-content:space-between;border:1px solid var(--line);border-radius:8px;padding:16px;background:#fff}.stat strong{font-size:clamp(2rem,10vw,3.6rem);line-height:.95}.fit.ok span{color:#168a55}.fit.bad span{color:#c93f32}.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.nocargo{min-height:calc(100svh - 112px);place-items:center;align-content:center;gap:22px;text-align:center}.nocargo img{width:138px}@media(min-width:760px){.flow{padding-top:22px}.grid{grid-template-columns:repeat(4,1fr)}.form{grid-template-columns:1.3fr repeat(5,minmax(88px,1fr))}.hero{min-height:350px}}@media(max-width:420px){.flow{padding-inline:10px}.top{gap:6px;grid-template-columns:48px 1fr auto}.logoBtn{width:48px;height:48px}.logoBtn img{width:40px}.step{font-size:.72rem}.new{padding:0 10px}.stats,.actions{grid-template-columns:1fr}}
</style>

<script>
const vehicles=[
{id:'ace',name:'Tata Ace',short:'Mini',l:220,w:149,h:150,kg:900,body:'Open'},
{id:'dost',name:'Ashok Leyland Dost',short:'LCV',l:281,w:162,h:165,kg:1500,body:'Open'},
{id:'bada',name:'Bada Dost',short:'LCV+',l:295,w:175,h:175,kg:1817,body:'Open'},
{id:'bolero',name:'Bolero Pickup',short:'Pickup',l:254,w:170,h:170,kg:1500,body:'Open'},
{id:'407',name:'Tata 407',short:'10 ft',l:317,w:183,h:190,kg:2500,body:'Closed'},
{id:'12',name:'12 ft',short:'Box',l:366,w:183,h:183,kg:3000,body:'Closed'},
{id:'14',name:'14 ft',short:'Box',l:427,w:183,h:213,kg:3500,body:'Closed'},
{id:'17',name:'17 ft',short:'Box',l:518,w:213,h:213,kg:5000,body:'Closed'},
{id:'19',name:'19 ft',short:'Box',l:579,w:213,h:213,kg:7000,body:'Closed'},
{id:'20',name:'20 ft Container',short:'20 ft',l:590,w:235,h:239,kg:7000,body:'Container'},
{id:'22',name:'22 ft',short:'Box',l:671,w:244,h:244,kg:9000,body:'Closed'},
{id:'24',name:'24 ft',short:'24 ft',l:732,w:244,h:244,kg:12000,body:'Container'},
{id:'32s',name:'32 ft SXL',short:'SXL',l:976,w:244,h:244,kg:8000,body:'Container'},
{id:'32m',name:'32 ft MXL',short:'MXL',l:976,w:244,h:244,kg:16000,body:'Container'},
{id:'40',name:'40 ft Trailer',short:'Trailer',l:1219,w:244,h:244,kg:21000,body:'Trailer'}
];
let state={step:'vehicle',vehicleId:'dost',cargo:[],editing:null};
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));
const num=v=>{const n=parseFloat(v);return Number.isFinite(n)?n:0};
function vehicle(){return vehicles.find(v=>v.id===state.vehicleId)||vehicles[1]}
function go(step){state.step=step;$('#start').classList.remove('active');$('#flow').classList.add('active');render()}
function home(){$('#start').classList.add('active');$('#flow').classList.remove('active')}
function reset(){state={step:'vehicle',vehicleId:'dost',cargo:[],editing:null};clearForm();go('vehicle')}
function render(){renderStep();renderVehicles();renderCargo();renderResult()}
function renderStep(){$$('.panel').forEach(p=>p.classList.remove('active'));$('#'+state.step+'Panel').classList.add('active');$$('.step').forEach(b=>b.classList.toggle('active',b.dataset.step===state.step))}
function renderVehicles(){const grid=$('#vehicleGrid');grid.innerHTML='';vehicles.forEach(v=>{const b=document.createElement('button');b.className='card '+(state.vehicleId===v.id?'selected':'');b.type='button';b.innerHTML='<span>'+v.short+'</span><strong>'+v.name+'</strong><small>'+v.body+'</small>';b.onclick=()=>{state.vehicleId=v.id;render()};grid.appendChild(b)});const v=vehicle();$('#summary').innerHTML='<strong>'+v.name+'</strong><span>'+v.body+'</span><small>'+v.l+' x '+v.w+' x '+v.h+' cm</small>'}
function formCargo(){return{name:$('#name').value.trim(),qty:$('#qty').value.trim(),l:$('#len').value.trim(),w:$('#wid').value.trim(),h:$('#hei').value.trim(),kg:$('#kg').value.trim()}}
function valid(){const c=formCargo();return[c.qty,c.l,c.w,c.h,c.kg].every(x=>num(x)>0)}
function clearForm(){['name','qty','len','wid','hei','kg'].forEach(id=>$('#'+id).value='');state.editing=null;$('#saveBtn').textContent='Add';$('#saveBtn').disabled=true}
function save(){if(!valid())return;const c=formCargo();if(state.editing){state.cargo=state.cargo.map(x=>x.id===state.editing?{...c,id:x.id}:x)}else state.cargo.push({...c,id:'c'+Date.now()});clearForm();renderCargo()}
function edit(item){$('#name').value=item.name;$('#qty').value=item.qty;$('#len').value=item.l;$('#wid').value=item.w;$('#hei').value=item.h;$('#kg').value=item.kg;state.editing=item.id;$('#saveBtn').textContent='Save';$('#saveBtn').disabled=false}
function removeCargo(id){state.cargo=state.cargo.filter(x=>x.id!==id);if(state.editing===id)clearForm();renderCargo()}
function renderCargo(){$('#cargoVehicle').textContent=vehicle().name;$('#saveBtn').disabled=!valid();$('#checkBtn').disabled=state.cargo.length===0;const list=$('#cargoList');list.innerHTML='';if(!state.cargo.length){list.innerHTML='<div class="empty">No cargo added</div>';return}state.cargo.forEach(item=>{const row=document.createElement('article');row.className='cargo';row.innerHTML='<div><strong>'+(item.name||'Cargo')+'</strong><span>'+item.qty+' pcs</span></div><div class="cargoActions"><button>Edit</button><button>Remove</button></div>';row.querySelector('button:first-child').onclick=()=>edit(item);row.querySelector('button:last-child').onclick=()=>removeCargo(item.id);list.appendChild(row)})}
function vol(l,w,h){return l*w*h/1000000}
function rotations(l,w,h){return[[l,w,h],[l,h,w],[w,l,h],[w,h,l],[h,l,w],[h,w,l]]}
function bestCapacity(v,l,w,h){let best={count:0,layout:[0,0,0],rot:[l,w,h]};for(const r of rotations(l,w,h)){const a=Math.floor(v.l/r[0]),b=Math.floor(v.w/r[1]),c=Math.floor(v.h/r[2]),count=a*b*c;if(count>best.count)best={count,layout:[a,b,c],rot:r}}return best}
function grade(v){return v>100?'Over':v>90?'Tight':'Good'}
function calc(){const v=vehicle();let totalVolume=0,totalWeight=0;const rows=state.cargo.map(i=>{const l=num(i.l),w=num(i.w),h=num(i.h),q=num(i.qty),kg=num(i.kg);const cap=bestCapacity(v,l,w,h);const itemVolume=vol(l,w,h)*q,itemWeight=kg*q;totalVolume+=itemVolume;totalWeight+=itemWeight;const dimensionOk=cap.count>0;const countOk=q<=cap.count;const weightOk=itemWeight<=v.kg;return{name:i.name||'Cargo',qty:q,fit:dimensionOk&&countOk&&weightOk,max:cap.count,layout:cap.layout,weight:itemWeight,weightOk,dimensionOk,countOk}});const vehicleVolume=vol(v.l,v.w,v.h);const vu=vehicleVolume?totalVolume/vehicleVolume*100:0,wu=v.kg?totalWeight/v.kg*100:0;const bad=rows.some(r=>!r.fit)||vu>100||wu>100;const warn=!bad&&(vu>90||wu>90);return{rows,status:bad?'bad':warn?'warn':'ok',title:bad?'No fit':warn?'Check once':'Fits',vu,wu,totalWeight}}
function renderResult(){const has=state.cargo.length>0;$('#noCargo').classList.toggle('hidden',has);$('#resultContent').classList.toggle('hidden',!has);if(!has)return;const r=calc(),v=vehicle();$('#hero').className='hero '+r.status;$('#resultVehicle').textContent=v.name;$('#resultTitle').textContent=r.title;$('#space').textContent=grade(r.vu);$('#weight').textContent=grade(r.wu);const list=$('#fitList');list.innerHTML='';r.rows.forEach(row=>{let msg=row.fit?'Fits':'No fit';if(!row.dimensionOk)msg='Too big';else if(!row.countOk)msg='Max '+row.max;else if(!row.weightOk)msg='Over weight';const el=document.createElement('div');el.className='fit '+(row.fit?'ok':'bad');el.innerHTML='<strong>'+row.name+'</strong><span>'+msg+'</span>';list.appendChild(el)})}
$('#startBtn').onclick=reset;$('#homeBtn').onclick=home;$('#newBtn').onclick=reset;$('#resultNew').onclick=reset;$('#saveBtn').onclick=save;$('#checkBtn').onclick=()=>go('result');$$('.step').forEach(b=>b.onclick=()=>go(b.dataset.step));$$('[data-go]').forEach(b=>b.onclick=()=>go(b.dataset.go));['name','qty','len','wid','hei','kg'].forEach(id=>$('#'+id).oninput=()=>$('#saveBtn').disabled=!valid());render();
</script>
</body>
